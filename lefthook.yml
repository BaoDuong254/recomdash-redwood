pre-commit:
  parallel: true
  commands:
    format:
      glob: '*'
      run: npx prettier --write --ignore-unknown {staged_files}
      stage_fixed: true

    lint:
      glob: '**/*.{js,ts,jsx,tsx}'
      run: npx eslint --fix {staged_files}
      stage_fixed: true

    tidy-check:
      glob: '{go-realtime/**/*.go,go-realtime/go.mod,go-realtime/go.sum}'
      root: 'go-realtime'
      run: |
        go mod tidy
        git diff --exit-code -- go.mod go.sum

    go-format:
      glob: 'go-realtime/**/*.go'
      root: 'go-realtime'
      run: gofmt -w .
      stage_fixed: true

    go-lint:
      glob: 'go-realtime/**/*.go'
      root: 'go-realtime'
      run: golangci-lint run ./...
      stage_fixed: true

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}

post-commit:
  commands:
    success-message:
      run: |
        git update-index --again
        echo "⬆️ Commit successfully made!"
        echo "🚀 Don't forget to push your changes!"
