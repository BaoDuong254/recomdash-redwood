upstream redwood_web {
    server redwood-web:3000;
}

upstream redwood_api {
    server redwood-api:8911;
}

upstream go_realtime {
    server go-realtime:8080;
}

server {
    listen 80;
    server_name _;

    # ── Go realtime WebSocket ──────────────────────────────────────────────
    location /ws {
        proxy_pass http://go_realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Go realtime REST (health, metrics, etc.) ───────────────────────────
    location /api/realtime/ {
        proxy_pass http://go_realtime;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Redwood serverless functions (GraphQL, bootstrap, etc.) ───────────
    # Strip /.redwood/functions prefix before forwarding: rw-server serves
    # functions at root level (/graphql, /auth, etc.), not under that path.
    location /.redwood/functions/ {
        proxy_pass http://redwood_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── nginx health probe (does not hit upstreams) ────────────────────────
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── SPA (everything else) ──────────────────────────────────────────────
    location / {
        proxy_pass http://redwood_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
