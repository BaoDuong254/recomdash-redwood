name: CI

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Get yarn cache directory
        id: yarn-cache
        shell: bash
        run: |
          echo "CACHE_DIR=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Setup yarn cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.CACHE_DIR }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate Prisma client
        run: yarn rw prisma generate

      - name: Run lint
        run: yarn rw lint

      - name: Run type check
        run: yarn rw type-check

      # - name: Run tests
      #   run: yarn rw test --no-watch

      - name: Build
        run: yarn rw build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          go-version-file: 'go-realtime/go.mod'
          cache: true

      - name: Verify Dependencies
        run: go mod verify
        working-directory: go-realtime

      - name: Download dependencies
        run: go mod download
        working-directory: go-realtime

      - name: Verify go.mod and go.sum are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
        working-directory: go-realtime

      - name: Check formatting
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "The following files are not formatted:"
            echo "$fmt_out"
            exit 1
          fi
        working-directory: go-realtime

      - name: Run go vet
        run: go vet ./...
        working-directory: go-realtime

      - name: Build
        run: go build ./...
        working-directory: go-realtime

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
        working-directory: go-realtime

      - name: Run staticcheck
        run: staticcheck ./...
        working-directory: go-realtime
