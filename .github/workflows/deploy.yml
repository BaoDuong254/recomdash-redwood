name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy when CI passed and the triggering push was to main
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image tag
        id: tag
        run: echo "TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Build & push all images ──────────────────────────────────────────
      - name: Build and push redwood-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/recomdash-api:${{ steps.tag.outputs.TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/recomdash-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push redwood-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/recomdash-web:${{ steps.tag.outputs.TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/recomdash-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push go-realtime
        uses: docker/build-push-action@v6
        with:
          context: ./go-realtime
          file: go-realtime/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/recomdash-go-realtime:${{ steps.tag.outputs.TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/recomdash-go-realtime:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx
        uses: docker/build-push-action@v6
        with:
          context: ./nginx
          file: nginx/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/recomdash-nginx:${{ steps.tag.outputs.TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/recomdash-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── SSH deploy to EC2 ────────────────────────────────────────────────
      - name: Copy compose file to EC2
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/recomdash/

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: TAG,DOCKERHUB_USERNAME
          script: |
            set -e
            cd /opt/recomdash

            # Pull latest images
            TAG="${{ steps.tag.outputs.TAG }}"
            DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export TAG DOCKERHUB_USERNAME

            docker compose -f docker-compose.prod.yml pull

            # Rolling restart (zero-downtime for stateless services)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Remove dangling images to free disk space
            docker image prune -f

            echo "Deployed SHA $TAG successfully"
